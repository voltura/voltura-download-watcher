name: Quality

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true
  NUGET_XMLDOC_MODE: skip

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Check for preinstalled .NET 10 SDK
        id: dotnet
        shell: pwsh
        run: |
          $available = $false
          if ($null -ne (Get-Command dotnet -ErrorAction SilentlyContinue)) {
            $available = [bool](dotnet --list-sdks | Where-Object { $_ -match '^10\.0\.' } | Select-Object -First 1)
          }
          "available=$($available.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

      - name: Setup .NET 10 fallback
        if: steps.dotnet.outputs.available != 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Build and test
        shell: pwsh
        run: dotnet test .\VolturaDownloadWatcher.Tests\VolturaDownloadWatcher.Tests.csproj --configuration Release

      - name: Verify generated branding
        shell: pwsh
        run: |
          .\scripts\generate-branding.ps1 -SkipScreenshot
          if (-not (git diff --quiet -- VolturaDownloadWatcher/Assets installer/assets)) {
            git diff -- VolturaDownloadWatcher/Assets installer/assets
            throw "Generated icon or NSIS artwork is out of date."
          }
